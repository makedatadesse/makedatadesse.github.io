<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Makeda Y. Tadesse</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inconsolata:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>

    body { background-image: none; }

    .contact-page {
      min-height: 100vh;
      padding: calc(var(--nav-height) + 5rem) var(--page-pad-x) 6rem;
      max-width: var(--max-width);
      margin: 0 auto;
    }

    /* ── PAGE TITLE ── */
    .contact-heading {
      font-family: var(--font-serif);
      font-size: clamp(2.8rem, 6vw, 5rem);
      line-height: 1.0;
      color: var(--ink);
      margin-bottom: 3.5rem;
    }

    .contact-heading em {
      font-style: italic;
      color: var(--accent);
    }

    /* ── TWO COLUMN ── */
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 6rem;
      align-items: start;
    }

    /* ── LEFT COLUMN ── */
    .contact-left {}

    .contact-blurb {
      font-family: var(--font-serif);
      font-size: 1rem;
      font-style: italic;
      line-height: 1.85;
      color: var(--ink-mid);
      margin-bottom: 2.5rem;
      max-width: 320px;
    }

    /* Email row */
    .contact-link-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.9rem 0;
      border-top: 1.5px solid var(--ink-light);
      text-decoration: none;
      color: inherit;
      transition: padding-left 0.2s, border-color 0.2s;
    }

    .contact-link-row:last-of-type {
      border-bottom: 1.5px solid var(--ink-light);
    }

    .contact-link-row:hover {
      padding-left: 0.5rem;
      border-top-color: var(--accent);
    }

    .contact-link-icon {
      font-family: var(--font-serif);
      font-size: 1rem;
      color: var(--ink-light);
      width: 1.2rem;
      flex-shrink: 0;
      transition: color 0.2s;
    }

    .contact-link-row:hover .contact-link-icon {
      color: var(--accent);
    }

    .contact-link-text {
      font-family: var(--font-bold);
      font-size: 0.73rem;
      color: var(--ink-mid);
      transition: color 0.2s;
    }

    .contact-link-row:hover .contact-link-text {
      color: var(--ink);
    }

    /* ── RIGHT COLUMN: FORM ── */
    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .form-label {
      font-family: var(--font-bold);
      font-weight: bolder;
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-mid);
    }

    .form-input,
    .form-textarea {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--ink);
      background: transparent;
      border: 1.5px solid var(--ink-xlight);
      padding: 0.7rem 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
      resize: none;
      appearance: none;
      -webkit-appearance: none;
      border-radius: 0;
    }

    .form-input::placeholder,
    .form-textarea::placeholder {
      color: var(--ink-xlight);
    }

    .form-input:focus,
    .form-textarea:focus {
      border-color: var(--ink-mid);
    }

    .form-textarea {
      height: 140px;
    }

    /* Submit button */
    .form-submit {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--ink);
      border: none;
      padding: 0.85rem 1.6rem;
      cursor: pointer;
      transition: background 0.2s;
      align-self: flex-end;
      border-radius: 0;
    }

    .form-submit:hover {
      background: var(--accent);
    }

    /* Form success message */
    .form-success {
      display: none;
      font-family: var(--font-mono);
      font-weight: bold;
      font-size: 1rem;
      letter-spacing: 0.08em;
      color: var(--accent-dark);
      padding: 0.75rem 1rem;
      border: 1px solid var(--accent-dark);
      margin-top: 0.5rem;
    }

    /* ── FOOTER ── */
    .site-footer {
      border-top: 1px solid var(--ink-xlight);
      padding: 2rem var(--page-pad-x);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .site-footer p {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      color: var(--ink-light);
      text-transform: uppercase;
    }

    .site-footer a { color: var(--ink-mid); transition: color 0.2s; }
    .site-footer a:hover { color: var(--accent); }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .contact-grid { grid-template-columns: 1fr; gap: 3rem; }
      .form-row { grid-template-columns: 1fr; }
      .form-submit { align-self: stretch; text-align: center; }
    }

  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="site-nav">
    <a href="index.html" class="nav-logo">
        <img src="images/lbnav.png" alt="MT"/>
    <ul class="nav-links">
      <li><a href="index.html">About</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="reading.html">Reading List</a></li>
      <li><a href="other-work.html">Other Work</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <div class="contact-page">

    <h1 class="contact-heading">Get in <em>Touch</em></h1>

    <div class="contact-grid">

      <!-- ── LEFT: text + email ── -->
      <div class="contact-left">

        <p class="contact-blurb">
          For inquiries, collaboration, or insights.
        </p>

        <a href="mailto:Tadesse.Mak@gmail.com" class="contact-link-row">
          <span class="contact-link-icon">✉</span>
          <span class="contact-link-text">MPT5913@psu.edu</span>
        </a>

        <a href="https://www.linkedin.com/in/makedatadesse" target="_blank" class="contact-link-row">
          <span class="contact-link-icon">in</span>
          <span class="contact-link-text">linkedin.com/in/makedatadesse</span>
        </a>

      </div>

      <!-- ── RIGHT: form ── -->
      <div>
        <form
          class="contact-form"
          id="contact-form"
          action="https://formspree.io/f/mzdnayze"
          method="POST"
        >

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="first-name">First Name</label>
              <input class="form-input" type="text" id="first-name" name="first_name" placeholder="" />
            </div>
            <div class="form-group">
              <label class="form-label" for="last-name">Last Name</label>
              <input class="form-input" type="text" id="last-name" name="last_name" placeholder="" />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="email">Email *</label>
            <input class="form-input" type="email" id="email" name="email" required placeholder="" />
          </div>

          <div class="form-group">
            <label class="form-label" for="message">Message</label>
            <textarea class="form-textarea" id="message" name="message" placeholder=""></textarea>
          </div>

          <button class="form-submit" type="submit">Send →</button>

          <div class="form-success" id="form-success">
            Message sent — I'll be in touch soon. Peace, Makeda
          </div>

        </form>
      </div>

    </div>
  </div>

  <footer class="site-footer">
    <p>© 2025 Makeda Y. Tadesse</p>
    <p><a href="mailto:Tadesse.Mak@gmail.com">Tadesse.Mak@gmail.com</a></p>
  </footer>

  <script src="js/main.js"></script>
  <script>
    // ── Formspree AJAX submit (optional — removes page redirect) ──
    const form = document.getElementById('contact-form');
    const success = document.getElementById('form-success');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const data = new FormData(form);
      const response = await fetch(form.action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      });
      if (response.ok) {
        form.reset();
        success.style.display = 'block';
      }
    });
  </script>

</body>
</html>
